<section class="station-page">
    <app-station-paraglidable-header
        title="Aktuelles Wetter am Startplatz Hörnleberg"
        [flyValue]="flyValue"
    ></app-station-paraglidable-header>
    <section class="charts-grid">
        <article class="chart-card chart-card-wide">
            <h3>
                <i class="bi bi-wind"></i>
                <span>Windgeschwindigkeit</span>
            </h3>
            <img src="https://fly2cloud.de/ws/wsHoernle/diagrams/wind120Day.png" alt="Windgeschwindigkeit für Hörnleberg" loading="lazy">
        </article>
        <article class="chart-card chart-card-wide">
            <h3>
                <i class="bi bi-compass"></i>
                <span>Windrichtung</span>
            </h3>
            <img src="https://fly2cloud.de/ws/wsHoernle/diagrams/richtungDay.png" alt="Windrichtung für Hörnleberg" loading="lazy">
        </article>
        @for (chart of weatherCharts; track chart.title) {
            <article class="chart-card">
                <h3>
                    <i [class]="'bi ' + chart.icon"></i>
                    <span>{{ chart.title }}</span>
                </h3>
                <img [src]="chart.src" [alt]="chart.title + ' für Hörnleberg'" loading="lazy">
            </article>
        }
    </section>
</section>
