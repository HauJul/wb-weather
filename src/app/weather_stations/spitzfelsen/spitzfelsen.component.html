<section class="station-page">
    <app-station-paraglidable-header
        title="Aktuelles Wetter am Startplatz Spitzfelsen"
        [flyValue]="flyValue"
        [isLoading]="isLoading"
        [hasError]="hasError"
    ></app-station-paraglidable-header>

    <section class="charts-grid">
        <article class="chart-card chart-card-wide">
            <h3>
                <i class="bi bi-wind"></i>
                <span>Windgeschwindigkeit</span>
            </h3>
            <img src="https://fly2cloud.de/ws/wsSpitz/diagrams/wind120Day.png" alt="Windgeschwindigkeit für Spitzfelsen" loading="lazy">
        </article>
        <article class="chart-card chart-card-wide">
            <h3>
                <i class="bi bi-compass"></i>
                <span>Windrichtung</span>
            </h3>
            <img src="https://fly2cloud.de/ws/wsSpitz/diagrams/richtungDay.png" alt="Windrichtung für Spitzfelsen" loading="lazy">
        </article>
        @for (chart of weatherCharts; track chart.title) {
            <article class="chart-card">
                <h3>
                    <i [class]="'bi ' + chart.icon"></i>
                    <span>{{ chart.title }}</span>
                </h3>
                <img [src]="chart.src" [alt]="chart.title + ' für Spitzfelsen'" loading="lazy">
            </article>
        }
    </section>

    <section class="widget-card">
        <iframe
            src="https://www.meteoblue.com/de/wetter/maps/widget/hausach_deutschland_2908974?windAnimation=1&gust=1&satellite=1&cloudsAndPrecipitation=1&temperature=1&sunshine=1&extremeForecastIndex=1&geoloc=fixed&tempunit=C&windunit=km%252Fh&lengthunit=metric&zoom=10&autowidth=auto"
            title="meteoblue Wetterkarte für Hausach"
            frameborder="0"
            scrolling="no"
            allowtransparency="true"
            sandbox="allow-same-origin allow-scripts allow-popups allow-popups-to-escape-sandbox"
        ></iframe>
        <div class="widget-attribution">
            <i class="bi bi-cloud-sun-fill"></i>
            <a href="https://www.meteoblue.com/de/wetter/maps/hausach_deutschland_2908974?utm_source=map_widget&utm_medium=linkus&utm_content=map&utm_campaign=Weather%2BWidget" target="_blank" rel="noopener">meteoblue</a>
        </div>
    </section>
</section>
